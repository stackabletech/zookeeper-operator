---
dimensions:
  - name: zookeeper
    values:
      - 3.9.4
      - 3.9.5
      # To use a custom image, add a comma and the full name after the product version
      # - x.x.x,oci.stackable.tech/sdp/zookeeper:x.x.x-stackable0.0.0-dev
  - name: zookeeper-latest
    values:
      - 3.9.5
      # To use a custom image, add a comma and the full name after the product version
      # - x.x.x,oci.stackable.tech/sdp/zookeeper:x.x.x-stackable0.0.0-dev
  # A single toggle for the runtime smoke test: "true" enables server TLS *and*
  # client-auth (mutual) TLS together, "false" disables TLS entirely. The full
  # use-server-tls x use-client-auth-tls config-text matrix (server-only TLS, the
  # auth-forces-TLS cross term, port/ssl.* lines) is covered exhaustively by the
  # Rust unit tests in zk_controller.rs, so the runtime smoke only needs one TLS
  # run (exercising test_tls.sh's mutual handshake) and one non-TLS run.
  - name: use-tls
    values:
      - "true"
      - "false"
  - name: openshift
    values:
      - "false"
tests:
  - name: smoke
    dimensions:
      - zookeeper
      - use-tls
      - openshift
  - name: delete-rolegroup
    dimensions:
      - zookeeper
      - openshift
  - name: znode
    dimensions:
      - zookeeper-latest
      - openshift
  - name: logging
    dimensions:
      - zookeeper
      - openshift
  - name: cluster-operation
    dimensions:
      - zookeeper-latest
      - openshift
suites:
  - name: nightly
    patch:
      - dimensions:
          - name: zookeeper
            expr: last
          - name: use-tls
            expr: "true"
  - name: smoke-latest
    select:
      - smoke
    patch:
      - dimensions:
          - expr: last
  - name: openshift
    patch:
      - dimensions:
          - expr: last
      - dimensions:
          - name: zookeeper
            expr: last
          - name: use-tls
            expr: "true"
          - name: openshift
            expr: "true"
